name: Node.js CI/CD

on:
  push:
    branches:
      - main
  pull_request:
  release:
    types: [published]

jobs:
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
      - name: Use pnpm
        uses: pnpm/action-setup@v6.0.3
        with: &setup-pnpm
          cache: true
      - name: Use Node.js
        uses: actions/setup-node@v6.4.0
        with: &setup-node
          node-version-file: .node-version

      - name: Install Project Dependencies
        run: pnpm install

      - name: ESLint
        run: pnpm lint:eslint
      - name: Prettier
        run: pnpm lint:prettier

  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
      - name: Use pnpm
        uses: pnpm/action-setup@v6.0.3
        with: *setup-pnpm
      - name: Use Node.js ${{ vars.NODE_VERSION }}
        uses: actions/setup-node@v6.4.0
        with: *setup-node

      - name: Install Project Dependencies
        run: pnpm install

      - name: Build
        run: pnpm build
        env:
          NUXT_UI_PRO_LICENSE: ${{ secrets.NUXT_UI_PRO_LICENSE }}
          NUXT_PUBLIC_SITE_URL: ${{ vars.NUXT_PUBLIC_SITE_URL }}
          NUXT_PUBLIC_STUDIO_TOKENS: ${{ secrets.NUXT_PUBLIC_STUDIO_TOKENS }}
          APPLICATIONINSIGHTS_CONNECTION_STRING: ${{ secrets.APPLICATIONINSIGHTS_CONNECTION_STRING }}

      - name: Upload Docs Output
        uses: actions/upload-artifact@v7.0.1
        if: github.event_name != 'pull_request'
        with:
          name: docs
          path: docs/.output
          include-hidden-files: true

      - name: Upload Package Distribution
        uses: actions/upload-artifact@v7.0.1
        if: github.event_name != 'pull_request'
        with:
          name: package
          path: packages/nuxt-swa/dist
          include-hidden-files: true

  test:
    name: Unit Test
    runs-on: ubuntu-latest
    permissions:
      id-token: write # to use OIDC
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
      - name: Use pnpm
        uses: pnpm/action-setup@v6.0.3
        with: *setup-pnpm
      - name: Use Node.js
        uses: actions/setup-node@v6.4.0
        with: *setup-node

      - name: Install Project Dependencies
        run: pnpm install

      - name: Test
        run: pnpm test

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v6.0.0
        with:
          use_oidc: true

  deploy:
    name: Deploy to Azure Static Web Apps
    needs: [lint, build, test]
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment:
      name: ${{ (github.event_name == 'release' && 'production') || 'staging' }}
      url: ${{ (github.event_name == 'release' && vars.NUXT_PUBLIC_SITE_URL) || steps.deploy.outputs.url || vars.NUXT_PUBLIC_SITE_URL }}
    permissions:
      id-token: write
      contents: read
      deployments: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
      - name: Use pnpm
        uses: pnpm/action-setup@v6.0.3
        with: *setup-pnpm
      - name: Use Node.js
        uses: actions/setup-node@v6.4.0
        with: *setup-node

      - name: Install Project Dependencies
        run: pnpm install --dev --ignore-scripts
      - name: Cache Azure Static Web Apps CLI Downloaded Files
        uses: actions/cache@v5.0.5
        with:
          key: swa-${{ runner.arch }}-${{ runner.os }}
          path: ~/.swa

      - name: Download Docs Output
        uses: actions/download-artifact@v8.0.1
        with:
          name: docs
          path: docs/.output

      - name: Azure Login
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure Static Web Apps
        id: deploy
        run: |
          # Run the actual deployment and capture the output
          output=$(pnpm swa deploy --env ${{ (github.event_name == 'release' && 'production') || 'preview' }} 2>&1)

          # Display the deployment log
          echo "$output"

          # Assert deployment succeeded (swa CLI may exit with code 0 even on failure)
          echo "$output" | grep -q "Project deployed to"

          # Extract the deployed URL from the log and set it as a step output
          url=$(echo "$output" | sed 's/\x1b\[[0-9;]*[a-zA-Z]//g' | grep "Project deployed to" | grep -oE 'https://[^ ]+')
          echo "url=$url" >> "$GITHUB_OUTPUT"

  publish:
    name: Publish Package
    needs: [lint, build, test]
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
      - name: Use pnpm
        uses: pnpm/action-setup@v6.0.3
        with: *setup-pnpm
      - name: Use Node.js
        uses: actions/setup-node@v6.4.0
        with: *setup-node

      - name: Download Package Distribution
        uses: actions/download-artifact@v8.0.1
        with:
          name: package
          path: packages/nuxt-swa/dist

      - name: Publish
        run: pnpm -r publish --no-git-checks --ignore-scripts --provenance
        working-directory: packages/nuxt-swa
